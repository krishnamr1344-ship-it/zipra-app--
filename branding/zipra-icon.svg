  <!-- Rounded tile -->
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#bg)"/>
  <rect x="64" y="64" width="896" height="896" rx="232" fill="url(#glow)"/>
  <rect x="64.5" y="64.5" width="895" height="895" rx="231.5" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="3"/>

  <!-- Zipra mark: leaf-bolt with subtle Z stem -->
