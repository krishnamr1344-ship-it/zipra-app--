             C 760 596 672 700 512 778
             C 352 700 264 596 264 470
             C 264 330 362 246 512 246 Z"
          fill="url(#mark)"/>
    <!-- central vein / motion swoosh forming a Z -->
    <path d="M392 392
             L632 392
             L432 560
             L632 560
             L632 624
             L392 624
             L592 456
             L392 456 Z"
          fill="#FF7A00"/>
    <!-- highlight leaf tip -->
    <path d="M512 246 C 600 248 668 292 712 360 C 648 326 580 312 512 312 C 470 312 432 322 400 340 C 448 286 472 250 512 246 Z"
          fill="#FFFFFF" fill-opacity="0.55"/>
